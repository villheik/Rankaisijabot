name: Dev Build

on:
  push:
    branches:
      - dev

jobs:
  build:
    name: Build & Push Dev
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Create SHA Container Tag
        id: sha_tag
        run: |
          tag=$(cut -c 1-7 <<< $GITHUB_SHA)
          echo "::set-output name=tag::$tag"

      - name: Checkout code
        uses: actions/checkout@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v2
        with:
          context: .
          file: ./Dockerfile
          push: true
          cache-from: type=registry,ref=ghcr.io/villheik/rankaisijabot:dev
          cache-to: type=inline
          tags: |
            ghcr.io/villheik/rankaisijabot:dev
            ghcr.io/villheik/rankaisijabot:${{ steps.sha_tag.outputs.tag }}-dev
          build-args: |
            GIT_SHA=${{ github.sha }}
